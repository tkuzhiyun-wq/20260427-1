<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全螢幕畫布影像擷取</title>
    <style>
        /* 移除邊距並隱藏捲軸，確保畫布填滿螢幕 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #e7c6ff;
        }

        canvas {
            display: block;
        }
    </style>
    <!-- 引入 MediaPipe Hands 相關套件 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

<canvas id="mainCanvas"></canvas>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let video = document.createElement('video');
    let handResults = null;

    /**
     * 初始化畫布尺寸
     */
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    /**
     * 初始化 MediaPipe Hands
     */
    const hands = new Hands({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults((results) => {
        handResults = results;
    });

    /**
     * 啟動攝影機並開始繪製
     */
    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 1280, height: 720 }, 
                audio: false 
            });
            video.srcObject = stream;
            video.play();
            
            // 定期將影像送入偵測器
            async function detectionLoop() {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    await hands.send({image: video});
                }
                requestAnimationFrame(detectionLoop);
            }
            detectionLoop();

            // 開始循環渲染
            render();
        } catch (err) {
            console.error("無法存取攝影機: ", err);
            alert("請允許開啟攝影機權限以顯示影像。");
        }
    }

    /**
     * 渲染函數
     */
    function render() {
        // 1. 設定畫布背景顏色 (e7c6ff)
        ctx.fillStyle = '#e7c6ff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. 計算影像寬高 (全螢幕寬高的 50%)
        const imgWidth = canvas.width * 0.5;
        const imgHeight = canvas.height * 0.5;

        // 3. 計算居中位置
        const x = (canvas.width - imgWidth) / 2;
        const y = (canvas.height - imgHeight) / 2;

        // 4. 繪製影像
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            ctx.drawImage(video, x, y, imgWidth, imgHeight);

            // 5. 繪製手部關鍵點連線
            if (handResults && handResults.multiHandLandmarks) {
                const connections = [
                    [0, 1, 2, 3, 4],    // 大拇指
                    [5, 6, 7, 8],       // 食指
                    [9, 10, 11, 12],    // 中指
                    [13, 14, 15, 16],   // 無名指
                    [17, 18, 19, 20]    // 小拇指
                ];

                ctx.strokeStyle = '#7209b7'; // 線條顏色
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';

                for (const landmarks of handResults.multiHandLandmarks) {
                    connections.forEach(path => {
                        ctx.beginPath();
                        path.forEach((index, i) => {
                            const point = landmarks[index];
                            const px = x + point.x * imgWidth;
                            const py = y + point.y * imgHeight;
                            if (i === 0) ctx.moveTo(px, py);
                            else ctx.lineTo(px, py);
                        });
                        ctx.stroke();
                    });
                }
            }
        }

        // 持續執行動畫
        requestAnimationFrame(render);
    }

    // 監聽視窗縮放
    window.addEventListener('resize', resizeCanvas);

    // 啟動
    resizeCanvas();
    setupCamera();
</script>

</body>
</html>
