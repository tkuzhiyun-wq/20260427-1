<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全螢幕畫布影像擷取</title>
    <style>
        /* 移除邊距並隱藏捲軸，確保畫布填滿螢幕 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #e7c6ff;
        }

        canvas {
            display: block;
        }
    </style>
    <!-- 引入 MediaPipe Hands 相關套件 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

<canvas id="mainCanvas"></canvas>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let video = document.createElement('video');
    video.autoplay = true;
    video.muted = true;
    video.playsInline = true;

    let handResults = null;
    let bubbles = []; // 儲存水泡物件
    let frameCount = 0;

    // 用於跟隨移動的座標狀態
    let currentX = window.innerWidth / 4; 
    let currentY = window.innerHeight / 4;

    /**
     * 水泡類別
     */
    class Bubble {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.startY = y;
            this.radius = Math.random() * 8 + 4;
            this.speed = Math.random() * 2 + 1;
            this.opacity = 0.8;
            this.popDistance = Math.random() * 100 + 50; // 上升多少後破掉
        }
        update() {
            this.y -= this.speed;
            if (this.startY - this.y > this.popDistance) {
                this.opacity -= 0.1; // 開始破掉（消失）
            }
        }
        draw(ctx) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
            ctx.lineWidth = 2;
            ctx.stroke();
            // 水泡反光效果
            ctx.beginPath();
            ctx.arc(this.x - this.radius/3, this.y - this.radius/3, this.radius/4, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity * 0.4})`;
            ctx.fill();
        }
    }

    /**
     * 初始化畫布尺寸
     */
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    /**
     * 初始化 MediaPipe Hands
     */
    const hands = new Hands({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults((results) => {
        handResults = results;
    });

    /**
     * 啟動攝影機並開始繪製
     */
    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 1280, height: 720 }, 
                audio: false 
            });
            video.srcObject = stream;
            await video.play();
            
            // 定期將影像送入偵測器
            async function detectionLoop() {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    try { await hands.send({image: video}); } catch(e) {}
                }
                requestAnimationFrame(detectionLoop);
            }
            detectionLoop();

            // 開始循環渲染
            render();
        } catch (err) {
            console.error("無法存取攝影機: ", err);
            alert("請允許開啟攝影機權限以顯示影像。");
        }
    }

    /**
     * 渲染函數
     */
    function render() {
        frameCount++;
        // 1. 設定畫布背景顏色 (e7c6ff)
        ctx.fillStyle = '#e7c6ff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. 計算影像寬高 (全螢幕寬高的 50%)
        const imgWidth = canvas.width * 0.5;
        const imgHeight = canvas.height * 0.5;

        // 3. 計算手部中心點，讓畫面跟隨手部
        let targetX = (canvas.width - imgWidth) / 2;
        let targetY = (canvas.height - imgHeight) / 2;

        if (handResults && handResults.multiHandLandmarks && handResults.multiHandLandmarks.length > 0) {
            let sumX = 0;
            let sumY = 0;
            let pointCount = 0;

            // 計算所有偵測到的手部關鍵點平均值
            handResults.multiHandLandmarks.forEach(landmarks => {
                landmarks.forEach(p => {
                    sumX += p.x;
                    sumY += p.y;
                    pointCount++;
                });
            });

            const avgX = sumX / pointCount;
            const avgY = sumY / pointCount;

            // 將視訊畫面的中心對準手部平均位置 (這裡使用了鏡像修正 1-avgX)
            targetX = (canvas.width * (1 - avgX)) - (imgWidth / 2);
            targetY = (canvas.height * avgY) - (imgHeight / 2);
        }

        // 平滑移動 (插值動畫)
        currentX += (targetX - currentX) * 0.1;
        currentY += (targetY - currentY) * 0.1;

        // 4. 繪製影像
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            ctx.save();
            // 先移動到目標座標
            ctx.translate(currentX, currentY);
            // 在方框內做鏡像翻轉
            ctx.translate(imgWidth, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, imgWidth, imgHeight);
            ctx.restore();

            // 5. 繪製手部關鍵點連線
            if (handResults && handResults.multiHandLandmarks) {
                const connections = [
                    [0, 1, 2, 3, 4],    // 大拇指
                    [5, 6, 7, 8],       // 食指
                    [9, 10, 11, 12],    // 中指
                    [13, 14, 15, 16],   // 無名指
                    [17, 18, 19, 20]    // 小拇指
                ];

                ctx.strokeStyle = '#7209b7'; 
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';

                for (const landmarks of handResults.multiHandLandmarks) {
                    // 在指尖產生水泡 (4, 8, 12, 16, 20)
                    if (frameCount % 10 === 0) {
                        [4, 8, 12, 16, 20].forEach(idx => {
                            const p = landmarks[idx];
                            // 注意：影像有做鏡像處理，水泡座標也要對應
                            bubbles.push(new Bubble(currentX + (1 - p.x) * imgWidth, currentY + p.y * imgHeight));
                        });
                    }

                    // 繪製骨架線條
                    connections.forEach(path => {
                        ctx.beginPath();
                        path.forEach((index, i) => {
                            const point = landmarks[index];
                            const px = currentX + (1 - point.x) * imgWidth;
                            const py = currentY + point.y * imgHeight;
                            if (i === 0) ctx.moveTo(px, py);
                            else ctx.lineTo(px, py);
                        });
                        ctx.stroke();
                    });

                    // 繪製關鍵點小圓圈
                    ctx.fillStyle = '#ff006e';
                    for (const point of landmarks) {
                        ctx.beginPath();
                        ctx.arc(currentX + (1 - point.x) * imgWidth, currentY + point.y * imgHeight, 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
        }

        // 6. 更新並繪製水泡
        for (let i = bubbles.length - 1; i >= 0; i--) {
            bubbles[i].update();
            bubbles[i].draw(ctx);
            if (bubbles[i].opacity <= 0) bubbles.splice(i, 1);
        }

        // 7. 置中文字顯示
        ctx.font = "bold 40px 'Microsoft JhengHei', Arial";
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("414730100許O云", canvas.width / 2, canvas.height / 2);

        // 持續執行動畫
        requestAnimationFrame(render);
    }

    // 監聽視窗縮放
    window.addEventListener('resize', resizeCanvas);

    // 啟動
    resizeCanvas();
    setupCamera();
</script>

</body>
</html>
